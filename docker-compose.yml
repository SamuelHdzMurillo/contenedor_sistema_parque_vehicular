services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parque_vehicular_web
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./docker/php:/var/www/html
      - php_sessions:/var/lib/php/sessions
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - parque_net

  db:
    image: mysql:8.0
    container_name: parque_vehicular_db
    restart: unless-stopped
    command: --log-bin-trust-function-creators=1
    ports:
      - "0.0.0.0:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parque_net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: parque_vehicular_phpmyadmin
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - parque_net

volumes:
  mysql_data:
    name: parque_vehicular_mysql_data
  php_sessions:
    name: parque_vehicular_php_sessions

networks:
  parque_net:
    name: parque_vehicular_net
    driver: bridge
